<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" role="img" aria-label="Heritage Global Solutions Ltd">
  <defs>
    <linearGradient id="shieldLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BCD3E6"/>
      <stop offset="100%" stop-color="#86A8C7"/>
    </linearGradient>
    <linearGradient id="shieldDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B6D7C"/>
      <stop offset="100%" stop-color="#2F3F4F"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <g transform="translate(30 8)">
    <!-- Outer frame -->
    <path d="M5 5 H135 V90 Q135 125 70 145 Q5 125 5 90 Z"
          fill="#FFFFFF" stroke="#A9B3BD" stroke-width="3"/>
    <!-- Light half -->
    <path d="M8 8 H70 V143 Q8 125 8 90 Z" fill="url(#shieldLight)"/>
    <!-- Dark half -->
    <path d="M70 8 H132 V90 Q132 125 70 143 Z" fill="url(#shieldDark)"/>
    <!-- Calligraphic H -->
    <path d="M38 30 C 38 30, 52 22, 60 28
             C 68 34, 58 52, 62 70
             C 66 85, 82 92, 92 82
             C 102 72, 96 58, 82 60
             C 68 62, 58 78, 62 100
             C 65 118, 78 128, 92 122"
          fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- Wordmark: HERITAGE -->
  <text x="210" y="90"
        font-family="'Times New Roman', 'Georgia', serif"
        font-size="56"
        font-weight="400"
        letter-spacing="2"
        fill="#2F5F8F"
        text-anchor="middle">HERITAGE</text>

  <!-- Tagline: Global Solutions Ltd -->
  <text x="210" y="130"
        font-family="'Brush Script MT', 'Segoe Script', cursive"
        font-size="26"
        font-style="italic"
        fill="#6B7280"
        text-anchor="middle">Global Solutions Ltd</text>
</svg>
